apiVersion: apps/v1
kind: Deployment
metadata:
  name: devlog

spec:
  replicas: 1

  selector:
    matchLabels:
      app: devlog

  template:
    metadata:
      labels:
        app: devlog

    spec:
      containers:
      - name: devlog
        image: YOUR_DOCKERHUB_USERNAME/devlog-app:latest

        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: devlog

spec:
  type: NodePort

  selector:
    app: devlog

  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080